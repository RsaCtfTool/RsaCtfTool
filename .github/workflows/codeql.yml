name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 1 * * *' # Every day at 01:30

jobs:
  analyze:
    name: Analyze (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    # Uncomment for local runs
    # env: 
    #   CODEQL_ACTION_DISABLE_TELEMETRY: true 

    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.9', '3.10' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:python/python:${{ matrix.python-version }}"
        # upload: false # Uncomment for local runs
        # output: 'sarif-results'